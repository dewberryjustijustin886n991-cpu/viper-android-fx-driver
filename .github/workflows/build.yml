name: Build Viper Android FX Driver

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b
        link-to-sdk: true
    
    - name: Install CMake and Ninja
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build
    
    - name: Create build directory
      run: mkdir -p build-${{ matrix.abi }}
    
    - name: Configure CMake for ${{ matrix.abi }}
      run: |
        cd build-${{ matrix.abi }}
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja
    
    - name: Build for ${{ matrix.abi }}
      run: |
        cd build-${{ matrix.abi }}
        ninja
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: libviper_audio-${{ matrix.abi }}
        path: libs/${{ matrix.abi }}/libviper_audio.so
  
  package:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Magisk Module Structure
      run: |
        MODDIR="viper_android_fx_driver_v1.0.0"
        mkdir -p $MODDIR/lib64/arm64-v8a
        mkdir -p $MODDIR/lib64/armeabi-v7a
        mkdir -p $MODDIR/lib64/x86_64
        mkdir -p $MODDIR/lib64/x86
        mkdir -p $MODDIR/config
        mkdir -p $MODDIR/data
        
        # Copy module files
        cp module.prop $MODDIR/
        cp module/post-fs-data.sh $MODDIR/post-fs-data.sh
        cp module/service.sh $MODDIR/service.sh
        cp module/install.sh $MODDIR/install.sh
        
        # Copy libraries
        cp libviper_audio-arm64-v8a/libviper_audio.so $MODDIR/lib64/arm64-v8a/
        cp libviper_audio-armeabi-v7a/libviper_audio.so $MODDIR/lib64/armeabi-v7a/
        cp libviper_audio-x86_64/libviper_audio.so $MODDIR/lib64/x86_64/
        cp libviper_audio-x86/libviper_audio.so $MODDIR/lib64/x86/
        
        # Set permissions
        find $MODDIR -type f -exec chmod 0644 {} \;
        find $MODDIR -type d -exec chmod 0755 {} \;
    
    - name: Create Magisk Module ZIP
      run: |
        MODDIR="viper_android_fx_driver_v1.0.0"
        cd $MODDIR
        zip -r ../viper_android_fx_driver_v1.0.0.zip .
        cd ..
    
    - name: Upload Magisk Module
      uses: actions/upload-artifact@v3
      with:
        name: magisk-module
        path: viper_android_fx_driver_v1.0.0.zip
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: viper_android_fx_driver_v1.0.0.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
